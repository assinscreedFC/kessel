server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fallback SPA : toute route inconnue renvoie index.html (routing côté client React).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés (Vite hash dans le nom).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
